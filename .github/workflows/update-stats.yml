name: Update profile stats

on:
  schedule:
    - cron: "13 1 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: profile-stats
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read

    steps:
      - name: Check out profile repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate light activity card
        uses: stats-organization/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448 # v2.0.1
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&hide_rank=true&card_width=495&custom_title=GitHub%20Activity&bg_color=135,F8FAFC,EEF2FF,ECFEFF&title_color=4F46E5&text_color=334155&icon_color=0891B2&border_color=C7D2FE&border_radius=12"
          path: profile/stats-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          core_version: 2.1.3

      - name: Generate dark activity card
        uses: stats-organization/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448 # v2.0.1
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&hide_rank=true&card_width=495&custom_title=GitHub%20Activity&bg_color=135,07111F,0B1220,1E1B4B&title_color=A78BFA&text_color=CBD5E1&icon_color=22D3EE&border_color=312E81&border_radius=12"
          path: profile/stats-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          core_version: 2.1.3

      - name: Generate light language card
        uses: stats-organization/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448 # v2.0.1
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&langs_count=8&card_width=495&size_weight=0.5&count_weight=0.5&custom_title=Languages%20in%20Public%20Repositories&bg_color=135,F8FAFC,EEF2FF,ECFEFF&title_color=4F46E5&text_color=334155&border_color=C7D2FE&border_radius=12"
          path: profile/top-langs-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          core_version: 2.1.3

      - name: Generate dark language card
        uses: stats-organization/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448 # v2.0.1
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&langs_count=8&card_width=495&size_weight=0.5&count_weight=0.5&custom_title=Languages%20in%20Public%20Repositories&bg_color=135,07111F,0B1220,1E1B4B&title_color=A78BFA&text_color=CBD5E1&border_color=312E81&border_radius=12"
          path: profile/top-langs-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          core_version: 2.1.3

      - name: Upload generated cards
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: profile-stats
          path: profile
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Check out profile repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download generated cards
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: profile-stats
          path: profile

      - name: Commit refreshed cards
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          if git diff --cached --quiet; then
            echo "Profile cards are already current."
            exit 0
          fi
          git commit -m "chore: refresh profile stats"
          git push
