name: Generate contribution snake

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/snake.yml"

permissions: {}

concurrency:
  group: contribution-snake
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Generate light and dark SVGs
        uses: Platane/snk/svg-only@d8f6715049803e982ee5ff501b6b9b7d5deeb09b # v3.5.0
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ github.token }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#0891B2&color_dots=#F8FAFC,#C7D2FE,#818CF8,#22D3EE,#0E7490
            dist/github-contribution-grid-snake-dark.svg?color_snake=#FFD84D&color_dots=#0B1220,#312E81,#6366F1,#22D3EE,#F8FAFC

      - name: Upload generated SVGs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: contribution-snake
          path: dist
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Download generated SVGs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: contribution-snake
          path: dist

      - name: Publish output branch
        uses: crazy-max/ghaction-github-pages@1d6ee9b181a81033a16bd707a1401afa978daab4 # v5.0.0
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
          allow_empty_commit: false
          jekyll: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
